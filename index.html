<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FriendsFirst — A pocket coach for conscious love</title>
<meta name="description" content="FriendsFirst matches you by values and attachment — not endless swipes — then coaches you through the whole arc, from first message to chosen family."/>
<link rel="stylesheet" href="ff-tokens.css"/>
<link rel="stylesheet" href="landing.css"/>
<style>
  /* landing-specific base */
  html, body { background: var(--ff-cream); }
  #root { min-height: 100vh; }
  .lp-boot {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: var(--ff-cream); color: var(--ff-aura);
    font-family: var(--ff-serif); font-style: italic; font-size: 18px;
    z-index: 999;
  }
</style>
</head>
<body>
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
      <defs>
        <radialGradient id="bg" cx="50%" cy="40%">
          <stop offset="0%" stop-color="#6B4FBB"/>
          <stop offset="100%" stop-color="#1A0F2E"/>
        </radialGradient>
      </defs>
      <rect width="400" height="400" fill="url(#bg)"/>
      <circle cx="200" cy="190" r="74" fill="#B8A4D9" opacity="0.4"/>
      <circle cx="200" cy="190" r="52" fill="#6B4FBB"/>
      <circle cx="200" cy="172" r="3" fill="#E8C97A"/>
      <text x="200" y="320" text-anchor="middle" fill="#F4ECDC"
            font-family="Georgia, serif" font-size="46" font-style="italic">FF</text>
    </svg>
  </template>

  <div class="lp-boot" id="boot">tuning the frequency…</div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- App components (for live phone mockups) -->
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="ff-decor.jsx"></script>
  <script type="text/babel" src="ff-app.jsx"></script>
  <script type="text/babel" src="ff-tabs.jsx"></script>
  <script type="text/babel" src="ff-spots.jsx"></script>
  <script type="text/babel" src="ff-photos-chat.jsx"></script>
  <script type="text/babel" src="ff-extras.jsx"></script>

  <!-- Landing sections -->
  <script type="text/babel" src="ff-landing.jsx"></script>
  <script type="text/babel" src="ff-landing2.jsx"></script>

  <script type="text/babel">
    function Boot() {
      const [ready, setReady] = React.useState(false);
      React.useEffect(() => {
        const id = setInterval(() => {
          if (window.LandingPage && window.IOSDevice && window.Sahi && window.Screen) {
            clearInterval(id);
            const b = document.getElementById('boot');
            if (b) b.remove();
            setReady(true);
          }
        }, 60);
        return () => clearInterval(id);
      }, []);
      if (!ready) return null;
      return <window.LandingPage/>;
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Boot/>);
  </script>
</body>
</html>
